<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center - Kidovate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stats-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-black italic text-cyan-400">KIDOVATE HUB</span>
            <div class="flex gap-4 text-xs font-bold uppercase">
                <a href="index.html" class="text-slate-400">Studio</a>
                <a href="arena.html" class="text-slate-400">Arena</a>
                <a href="games.html" class="text-cyan-400 border-b-2 border-cyan-400">Games</a>
                <a href="about.html" class="text-slate-400">About</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter">SENTINEL GAME CENTER</h1>
            <p class="text-slate-400 uppercase text-xs tracking-[0.2em] mt-2">Level Up Your Icebound Ally</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="stats-card p-8 rounded-[2rem] shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">CORE STATUS</h2>
                    <span id="level-badge" class="bg-cyan-500 text-black px-3 py-1 rounded-full text-xs font-black">LVL 1</span>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-2 uppercase tracking-widest text-slate-400">
                            <span>Energy Core</span>
                            <span id="energy-val">80%</span>
                        </div>
                        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                            <div id="energy-bar" class="progress-fill h-full bg-gradient-to-r from-cyan-500 to-blue-500" style="width: 80%"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs font-bold mb-2 uppercase tracking-widest text-slate-400">
                            <span>Trust Link</span>
                            <span id="trust-val">20%</span>
                        </div>
                        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                            <div id="trust-bar" class="progress-fill h-full bg-gradient-to-r from-purple-500 to-pink-500" style="width: 20%"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="interact('feed')" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl transition-all active:scale-95">
                        <span class="block text-2xl">🔋</span>
                        <span class="text-[10px] font-black uppercase">Recharge</span>
                    </button>
                    <button onclick="interact('pat')" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl transition-all active:scale-95">
                        <span class="block text-2xl">👋</span>
                        <span class="text-[10px] font-black uppercase">Sync Link</span>
                    </button>
                </div>
            </div>

            <div class="stats-card p-8 rounded-[2rem] shadow-2xl flex flex-col items-center text-center">
                <h2 class="text-xl font-black italic mb-2">DATA HARVEST</h2>
                <p class="text-slate-400 text-xs mb-8 uppercase font-bold tracking-widest">Tap to collect fragments</p>
                
                <button onclick="harvest()" class="relative group">
                    <div class="absolute inset-0 bg-cyan-500 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <div class="relative w-32 h-32 bg-slate-900 border-4 border-cyan-500 rounded-full flex items-center justify-center text-5xl shadow-inner active:scale-90 transition-transform cursor-pointer">
                        💎
                    </div>
                </button>
                
                <div class="mt-8">
                    <p class="text-3xl font-black text-cyan-400" id="fragment-count">0</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Fragments Collected</p>
                </div>
            </div>

        </div>

        <div id="game-log" class="mt-10 text-center text-slate-500 italic text-sm">
            Welcome to the Game Center, Commander.
        </div>
    </main>

    <script>
        let trust = 20;
        let energy = 80;
        let fragments = 0;
        let level = 1;

        function interact(type) {
            const log = document.getElementById('game-log');
            if(type === 'feed') {
                energy = Math.min(100, energy + 10);
                log.innerText = "Sentinel Core Recharged!";
            } else {
                trust = Math.min(100, trust + 5);
                log.innerText = "Link Synchronized. Trust increased!";
                checkLevel();
            }
            updateUI();
        }

        function harvest() {
            fragments++;
            document.getElementById('fragment-count').innerText = fragments;
            if(fragments % 10 === 0) {
                trust = Math.min(100, trust + 2);
                updateUI();
            }
        }

        function checkLevel() {
            if(trust >= 100 && level === 1) {
                level = 2;
                document.getElementById('level-badge').innerText = "LVL 2";
                document.getElementById('game-log').innerText = "EVOLUTION COMPLETE! Sentinel is now Level 2!";
                alert("CONGRATULATIONS! Your Sentinel has leveled up!");
            }
        }

        function updateUI() {
            document.getElementById('energy-bar').style.width = energy + "%";
            document.getElementById('energy-val').innerText = energy + "%";
            document.getElementById('trust-bar').style.width = trust + "%";
            document.getElementById('trust-val').innerText = trust + "%";
        }
    </script>
</body>
</html>
