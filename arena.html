<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .tab-active { border-bottom: 4px solid #06b6d4; color: #06b6d4; }
        .tab-inactive { color: #64748b; border-bottom: 4px solid transparent; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="bg-slate-900 border-b border-slate-800 shadow-lg p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-black italic text-cyan-400">KIDOVATE ARENA</span>
            <div class="flex gap-6 font-bold text-xs uppercase">
                <a href="index.html" class="tab-inactive px-2">Studio</a>
                <a href="arena.html" class="tab-active px-2">Arena</a>
                <a href="hangman.html" class="tab-inactive px-2">Hangman</a>
                <a href="about.html" class="tab-inactive px-2">About</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-4xl mx-auto w-full p-6 flex flex-col items-center">
        <div id="game-container" class="relative w-full h-[400px] bg-slate-900 rounded-3xl border-4 border-slate-800 shadow-2xl overflow-hidden">
            <div id="canvas-container" class="w-full h-full"></div>
            <div id="upload-overlay" class="absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center z-20">
                <input type="file" id="modelUpload" accept=".glb" class="hidden">
                <label for="modelUpload" class="bg-cyan-600 px-8 py-4 rounded-2xl font-black cursor-pointer uppercase transition-all">Deploy Hero</label>
            </div>
            <div class="absolute top-4 inset-x-4 flex justify-between z-10 pointer-events-none">
                <div class="bg-black/50 p-2 rounded-lg border border-red-500/50">
                    <p class="text-[8px] text-red-400 font-bold uppercase">Health</p>
                    <div class="w-32 h-2 bg-slate-800 rounded-full mt-1"><div id="hp-player" class="w-full h-full bg-red-500 rounded-full transition-all"></div></div>
                </div>
                <div class="bg-black/50 p-2 rounded-lg border border-cyan-500/50">
                    <p class="text-[8px] text-cyan-400 font-bold uppercase">Sentinel Core</p>
                    <div class="w-32 h-2 bg-slate-800 rounded-full mt-1"><div id="hp-enemy" class="w-full h-full bg-cyan-500 rounded-full transition-all"></div></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 w-full mt-6">
            <button onclick="battleAction('Strike')" class="bg-slate-900 border-2 border-red-600 py-4 rounded-2xl font-black hover:bg-red-600 transition-all active:scale-95">STRIKE</button>
            <button onclick="battleAction('Shield')" class="bg-slate-900 border-2 border-blue-600 py-4 rounded-2xl font-black hover:bg-blue-600 transition-all active:scale-95">SHIELD</button>
            <button onclick="battleAction('Repair')" class="bg-slate-900 border-2 border-green-600 py-4 rounded-2xl font-black hover:bg-green-600 transition-all active:scale-95">REPAIR</button>
        </div>

        <div id="battle-log" class="mt-6 text-slate-500 italic text-sm text-center">Awaiting hero deployment...</div>
    </main>

    <script>
        let scene, camera, renderer, model, mixer;
        const container = document.getElementById('canvas-container');

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth/container.offsetHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            animate();
        }

        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            new THREE.GLTFLoader().load(URL.createObjectURL(file), (gltf) => {
                if(model) scene.remove(model);
                model = gltf.scene;
                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model, true);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const safeDim = (maxDim > 1000 || maxDim < 0.01) ? 100 : maxDim;
                const scale = 2.5 / safeDim;
                model.scale.set(scale, scale, scale);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                scene.add(model);
                document.getElementById('upload-overlay').style.display = 'none';
                document.getElementById('battle-log').innerText = "Hero Online! Ready for combat.";
                if(gltf.animations.length) { mixer = new THREE.AnimationMixer(model); mixer.clipAction(gltf.animations[0]).play(); }
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            if(mixer) mixer.update(0.016);
            if(model) model.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        function battleAction(type) {
            const log = document.getElementById('battle-log');
            log.innerText = `Action: Sentinel performed ${type}!`;
            log.classList.add('text-white');
            setTimeout(() => log.classList.remove('text-white'), 500);
        }

        init();
        window.onresize = () => { camera.aspect = container.offsetWidth/container.offsetHeight; camera.updateProjectionMatrix(); renderer.setSize(container.offsetWidth, container.offsetHeight); };
    </script>
</body>
</html>
